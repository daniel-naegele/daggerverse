name: Backfill Flutter Images

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  versions:
    name: List versions
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.matrix.outputs.versions }}
    steps:
      - uses: actions/checkout@v4

      - name: Get stable Flutter versions (last 2 years)
        id: stable
        uses: dagger/dagger-for-github@v8.4.0
        with:
          workdir: flutter-container
          version: "0.21.7"
          call: stable-versions-since
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Build matrix JSON
        id: matrix
        env:
          VERSIONS: ${{ steps.stable.outputs.output }}
        run: |
          matrix=$(echo "$VERSIONS" | jq -Rsc '[
            split("\n")[] | select(length > 0) |
            . as $v | (split(".") | map(tonumber)) as [$maj, $min, $pat] |
            select($maj > 3 or ($maj == 3 and ($min > 29 or ($min == 29 and $pat >= 0))))
          ]')
          echo "versions=$matrix" >> $GITHUB_OUTPUT

  publish:
    name: Publish ${{ matrix.version }}
    needs: versions
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ${{ fromJSON(needs.versions.outputs.versions) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Check if image already published
        id: check
        env:
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$REGISTRY_PASSWORD" | docker login ${{ vars.REGISTRY }} -u ${{ vars.REGISTRY_USERNAME }} --password-stdin
          if docker manifest inspect "${{ vars.REGISTRY }}/flutter:${{ matrix.version }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish Flutter images for ${{ matrix.version }}
        if: steps.check.outputs.exists != 'true'
        uses: dagger/dagger-for-github@v8.4.0
        with:
          workdir: flutter-container
          version: "0.21.7"
          call: >-
            with-flutter-version --version=${{ matrix.version }}
            publish
            --registry=${{ vars.REGISTRY }}
            --username=${{ vars.REGISTRY_USERNAME }}
            --password=env:REGISTRY_PASSWORD
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
        env:
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
